name: Daily News Mail

on:
  schedule:
    - cron: '0 22 * * *'  # 한국시간 오전 7시
    - cron: '0 8 * * *'   # 한국시간 오후 5시
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore sent news cache
        uses: actions/cache@v4
        with:
          path: sent_articles.json
          key: sent-articles-${{ github.run_id }}
          restore-keys: |
            sent-articles-

      - run: pip install -r requirements.txt

      - run: python news_mail.py
        env:
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
