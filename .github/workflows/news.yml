name: Daily News Mail

on:
  schedule:
    - cron: '7 22 * * *'   # 한국시간 오전 7:07
    - cron: '7 9 * * *'    # 한국시간 오후 6:07
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 뉴스 메일 발송
        run: python news_mail.py
        env:
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
